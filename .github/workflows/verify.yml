name: verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify-ubuntu:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: ${{ hashFiles('package.json') != '' }}
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        if: ${{ hashFiles('pyproject.toml') != '' }}
        with:
          python-version: '3.12'
      - name: Install pnpm
        if: ${{ hashFiles('package.json') != '' }}
        run: npm install -g pnpm@10
      - name: Install dependencies
        run: |
          if [ -f package.json ]; then pnpm install --frozen-lockfile || pnpm install; fi
          if [ -f pyproject.toml ]; then python -m pip install -U pip pytest; fi
      - name: Verify
        run: ./.trellis/scripts/verify.sh

  verify-arch-container:
    runs-on: ubuntu-latest
    container: archlinux:latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install base toolchain
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed git nodejs npm python go
      - name: Install dependencies
        run: |
          if [ -f package.json ]; then npm install -g pnpm@10; pnpm install; fi
          if [ -f pyproject.toml ]; then python -m ensurepip --upgrade || true; python -m pip install -U pip pytest; fi
      - name: Verify
        run: ./.trellis/scripts/verify.sh
