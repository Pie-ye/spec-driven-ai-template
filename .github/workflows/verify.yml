name: verify

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          version: 2025.12.12
          install: true
          cache: true
      - name: Install locked core tools
        run: mise install --locked
      - name: Doctor
        run: mise run doctor
      - name: Setup enabled profiles
        run: mise run setup
      - name: Verify through the project contract
        run: mise run verify
      - name: Upload test reports when present
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/test-results/**
            **/reports/**
            **/coverage/**
          if-no-files-found: ignore
