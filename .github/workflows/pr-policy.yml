name: pr-policy

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate PRD branch and evidence
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if ! printf '%s\n' "$HEAD_BRANCH" | grep -Eq '^(prd|fix|refactor)/PRD-[0-9]+-[a-z0-9-]+$'; then
            echo "Branch must be prd/, fix/, or refactor/ with a PRD ID: $HEAD_BRANCH"
            exit 1
          fi
          prd_id="$(printf '%s\n' "$HEAD_BRANCH" | sed -E 's#^(prd|fix|refactor)/(PRD-[0-9]+)-.*#\2#')"
          prd_file=""
          for candidate in .trellis/prds/${prd_id}-*.md; do
            if [ -f "$candidate" ]; then prd_file="$candidate"; break; fi
          done
          test -n "$prd_file" || { echo "No canonical PRD found for $prd_id"; exit 1; }
          if grep -Eq '^\|[[:space:]]*AC-[0-9]+[[:space:]]*\|[[:space:]]*(Pending|Unclear|Fail)' "$prd_file"; then
            echo "PRD evidence table is not ready: $prd_file"
            exit 1
          fi
          echo "Policy passed for $prd_file"
