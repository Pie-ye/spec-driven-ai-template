services:
  pi:
    image: node:24-bookworm-slim
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      PI_TELEMETRY: '0'
      PI_SKIP_VERSION_CHECK: '1'
    volumes:
      - ../:/workspace
      - pi-agent-home:/root/.pi/agent
    command: >-
      bash -lc "apt-get update && apt-get install -y git bash ripgrep ca-certificates && npm install -g --ignore-scripts @earendil-works/pi-coding-agent && pi"

volumes:
  pi-agent-home:
